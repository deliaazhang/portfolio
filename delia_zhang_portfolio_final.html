
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif; }

  .desktop {
    width: 100%; min-height: 620px;
    background: #fde8ef; border-radius: 12px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .wallpaper-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

  .menubar {
    height: 28px; background: rgba(255,220,230,0.65);
    backdrop-filter: blur(20px); display: flex; align-items: center;
    padding: 0 14px; gap: 16px; flex-shrink: 0;
    position: relative; z-index: 10;
    border-bottom: 0.5px solid rgba(220,140,160,0.3);
  }
  .menubar-left { display: flex; align-items: center; gap: 14px; font-size: 13px; color: #7a3050; font-weight: 500; }
  .menubar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 12px; color: #9a5070; }

  .desktop-area {
    flex: 1; padding: 24px 20px 12px;
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 16px; align-content: start;
    position: relative; z-index: 5;
  }

  .folder {
    display: flex; flex-direction: column; align-items: center;
    gap: 5px; cursor: pointer; padding: 10px 6px; border-radius: 10px;
    transition: background 0.15s; user-select: none;
  }
  .folder:hover { background: rgba(255,180,200,0.3); }
  .folder:active { transform: scale(0.96); }
  .folder-icon { width: 64px; height: 52px; }
  .folder-icon svg { width: 64px; height: 52px; filter: drop-shadow(0 2px 4px rgba(180,80,120,0.2)); }
  .folder-name { font-size: 11px; color: #5a2040; text-align: center; max-width: 84px; line-height: 1.3; font-weight: 500; text-shadow: 0 1px 2px rgba(255,220,230,0.9); }

  .dock-container { display: flex; justify-content: center; padding: 0 0 14px; position: relative; z-index: 10; }
  .dock {
    display: flex; align-items: flex-end; gap: 8px;
    background: rgba(255,220,230,0.55); backdrop-filter: blur(30px);
    border: 0.5px solid rgba(240,160,190,0.5); border-radius: 22px;
    padding: 10px 16px;
  }
  .dock-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: transform 0.15s; position: relative; }
  .dock-item:hover { transform: scale(1.3) translateY(-8px); }
  .dock-item:hover .dock-tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }
  .dock-icon { width: 52px; height: 52px; border-radius: 13px; display: flex; align-items: center; justify-content: center; }
  .dock-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(180,80,120,0.5); }
  .dock-divider { width: 0.5px; height: 40px; background: rgba(200,120,150,0.3); margin: 0 4px; }
  .dock-tooltip {
    position: absolute; bottom: 72px; left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: rgba(60,10,30,0.88); color: #ffe8f0;
    font-size: 11px; padding: 3px 9px; border-radius: 6px;
    white-space: nowrap; opacity: 0; transition: all 0.15s; pointer-events: none;
  }

  .modal-overlay {
    position: absolute; inset: 0; background: rgba(180,80,120,0.18);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    z-index: 100; border-radius: 12px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .window {
    background: rgba(255,246,250,0.98); border-radius: 14px;
    width: 560px; max-width: 92%;
    border: 0.5px solid rgba(220,150,180,0.4);
    overflow: hidden; transform: scale(0.92); transition: transform 0.2s;
    max-height: 480px; display: flex; flex-direction: column;
    box-shadow: 0 8px 32px rgba(180,80,120,0.18);
  }
  .modal-overlay.open .window { transform: scale(1); }
  .titlebar {
    height: 38px; background: rgba(255,220,235,0.95);
    display: flex; align-items: center; padding: 0 14px; gap: 8px; flex-shrink: 0;
    border-bottom: 0.5px solid rgba(220,150,180,0.3);
  }
  .traffic-light { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
  .tl-red { background: #ff5f57; } .tl-yellow { background: #febc2e; } .tl-green { background: #28c840; }
  .window-title { flex: 1; text-align: center; font-size: 13px; color: #8a4060; font-weight: 500; }
  .window-body { overflow-y: auto; flex: 1; }
  .window-body::-webkit-scrollbar { width: 5px; }
  .window-body::-webkit-scrollbar-thumb { background: rgba(200,120,160,0.3); border-radius: 3px; }

  /* Finder */
  .finder-layout { display: flex; height: 100%; min-height: 360px; }
  .finder-sidebar { width: 155px; background: rgba(255,210,225,0.6); border-right: 0.5px solid rgba(220,150,180,0.25); padding: 12px 0; flex-shrink: 0; overflow-y: auto; }
  .sidebar-section { font-size: 9.5px; color: #b06080; font-weight: 600; letter-spacing: 0.06em; padding: 0 12px 5px; text-transform: uppercase; margin-top: 10px; }
  .sidebar-item { display: flex; align-items: center; gap: 7px; padding: 5px 10px; font-size: 11.5px; color: #6a3050; cursor: pointer; border-radius: 6px; margin: 1px 5px; }
  .sidebar-item:hover { background: rgba(255,180,200,0.35); }
  .sidebar-item.active { background: rgba(255,160,190,0.4); color: #4a1030; font-weight: 500; }
  .finder-content { flex: 1; overflow-y: auto; background: rgba(255,248,250,0.95); }
  .finder-file { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer; border-bottom: 0.5px solid rgba(220,150,180,0.1); }
  .finder-file:hover { background: rgba(255,200,220,0.25); }
  .file-icon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
  .file-info { flex: 1; }
  .file-name { font-size: 12.5px; color: #4a1030; font-weight: 500; }
  .file-meta { font-size: 11px; color: #b07090; margin-top: 1px; line-height: 1.4; }
  .file-date { font-size: 10.5px; color: #c090a8; flex-shrink: 0; }

  /* Notes */
  .notes-layout { display: flex; height: 100%; min-height: 360px; }
  .notes-list { width: 170px; background: #fce8d0; border-right: 0.5px solid rgba(0,0,0,0.08); overflow-y: auto; flex-shrink: 0; }
  .notes-list-header { font-size: 12px; font-weight: 600; color: #7a4820; padding: 12px 14px 8px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  .notes-list-item { padding: 9px 14px; border-bottom: 0.5px solid rgba(0,0,0,0.06); cursor: pointer; transition: background 0.1s; }
  .notes-list-item:hover { background: rgba(0,0,0,0.04); }
  .notes-list-item.active { background: rgba(0,0,0,0.09); }
  .note-title { font-size: 12px; font-weight: 500; color: #4a2800; }
  .note-preview { font-size: 10.5px; color: #9a6840; margin-top: 1px; }
  .notes-body { flex: 1; background: #fffdf8; padding: 18px 20px; overflow-y: auto; }
  .notes-body h2 { font-size: 15px; font-weight: 600; color: #3a1800; margin-bottom: 10px; letter-spacing: -0.02em; }
  .notes-body h3 { font-size: 12.5px; font-weight: 600; color: #5a2800; margin: 12px 0 2px; }
  .notes-body p { font-size: 12px; color: #5a3820; line-height: 1.7; margin-bottom: 8px; }
  .notes-body .date { font-size: 10.5px; color: #b07840; margin-bottom: 4px; }
  .notes-tag { display: inline-block; background: #f9d0e8; color: #8a2050; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; margin-right: 4px; margin-bottom: 5px; }
  .notes-tag.blue { background: #d0e8f9; color: #204880; }
  .notes-tag.green { background: #d0f0e0; color: #206040; }
  .notes-tag.yellow { background: #faecc8; color: #7a5010; }
</style>
